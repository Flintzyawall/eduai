<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI - Курсы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <nav class="fixed top-0 w-full bg-white shadow-md z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-2 hover:opacity-80 transition">
    <div class="w-10 h-10 gradient-bg rounded-lg flex items-center justify-center">
        <i class="fas fa-brain text-white text-xl"></i>
    </div>
    <span class="text-2xl font-bold gradient-text">EduAI</span>
</a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-purple-600 transition">Главная</a>
                    <a href="courses.html" class="text-purple-600 font-medium">Курсы</a>
                    <a href="features.html" class="text-gray-700 hover:text-purple-600 transition">Возможности</a>
                    <a href="about.html" class="text-gray-700 hover:text-purple-600 transition">О нас</a>
                </div>
                <div class="flex items-center space-x-4" id="authButtons"></div>
            </div>
        </div>
    </nav>

    <div class="pt-16 min-h-screen">
        <section class="py-20 bg-gradient-to-b from-purple-50 to-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-16">
                    <h1 class="text-5xl font-bold mb-4">Наши <span class="gradient-text">курсы</span></h1>
                    <p class="text-xl text-gray-600">8+ курсов по программированию, базам данных, веб-разработке и школьным предметам</p>
                </div>
                
                <div id="coursesGrid" class="grid md:grid-cols-3 gap-8"></div>
            </div>
        </section>
    </div>

   <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-8 fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Вход в систему</h2>
            <button onclick="closeModal('loginModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Пароль</label>
                <input type="password" id="loginPassword" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent outline-none">
            </div>
            <button type="submit" class="w-full py-3 gradient-bg text-white rounded-lg font-medium hover:shadow-lg transition">Войти</button>
        </form>
        <p class="text-center mt-4 text-sm text-gray-600">Нет аккаунта? <a href="#" onclick="switchToRegister()" class="text-purple-600 font-medium">Зарегистрироваться</a></p>
    </div>
</div>

<div id="registerModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-8 fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Регистрация</h2>
            <button onclick="closeModal('registerModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
        </div>
        <form onsubmit="handleRegister(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Имя</label>
                <input type="text" id="registerName" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" id="registerEmail" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Пароль</label>
                <input type="password" id="registerPassword" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent outline-none">
            </div>
            <button type="submit" class="w-full py-3 gradient-bg text-white rounded-lg font-medium hover:shadow-lg transition">Зарегистрироваться</button>
        </form>
        <p class="text-center mt-4 text-sm text-gray-600">Уже есть аккаунт? <a href="#" onclick="switchToLogin()" class="text-purple-600 font-medium">Войти</a></p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
