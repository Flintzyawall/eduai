<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI - Панель управления</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <nav class="fixed top-0 w-full bg-white shadow-md z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-2 hover:opacity-80 transition">
    <div class="w-10 h-10 gradient-bg rounded-lg flex items-center justify-center">
        <i class="fas fa-brain text-white text-xl"></i>
    </div>
    <span class="text-2xl font-bold gradient-text">EduAI</span>
</a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-purple-600 transition">Главная</a>
                    <a href="courses.html" class="text-gray-700 hover:text-purple-600 transition">Курсы</a>
                    <a href="features.html" class="text-gray-700 hover:text-purple-600 transition">Возможности</a>
                    <a href="about.html" class="text-gray-700 hover:text-purple-600 transition">О нас</a>
                </div>
                <div class="flex items-center space-x-4" id="authButtons"></div>
            </div>
        </div>
    </nav>

    <div class="pt-16 min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="mb-8">
                <h1 class="text-3xl font-bold mb-2">Добро пожаловать, <span id="dashboardUserName" class="gradient-text"></span>!</h1>
                <p class="text-gray-600">Продолжайте свое обучение</p>
            </div>

            <div class="grid md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-md card-hover">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center"><i class="fas fa-book text-purple-600 text-xl"></i></div>
                        <span class="text-2xl font-bold" id="completedCourses">0</span>
                    </div>
                    <p class="text-gray-600">Пройдено курсов</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-md card-hover">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center"><i class="fas fa-check-circle text-green-600 text-xl"></i></div>
                        <span class="text-2xl font-bold" id="correctAnswers">0</span>
                    </div>
                    <p class="text-gray-600">Правильных ответов</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-md card-hover">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center"><i class="fas fa-fire text-blue-600 text-xl"></i></div>
                        <span class="text-2xl font-bold" id="currentStreak">0</span>
                    </div>
                    <p class="text-gray-600">Дней подряд</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-md card-hover">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center"><i class="fas fa-trophy text-yellow-600 text-xl"></i></div>
                        <span class="text-2xl font-bold" id="totalPoints">0</span>
                    </div>
                    <p class="text-gray-600">Баллов</p>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-8 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h3 class="text-xl font-bold mb-4">Прогресс обучения</h3>
                    <canvas id="progressChart"></canvas>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h3 class="text-xl font-bold mb-4">Последняя активность</h3>
                    <div id="recentActivity" class="space-y-4"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="text-xl font-bold mb-4">Доступные тесты</h3>
                <div id="availableTests" class="grid md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
